services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: lab9
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_2:/var/lib/mysql

  web:
    build: .
    command: uv run uvicorn app_oidc:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - /app/.venv
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: lab9
    depends_on:
      - db

volumes:
  mysql_data_2:
